name: Deploy Application

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: engine-health-app

jobs:
  # ==================== STAGE 1: SETUP ====================
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.python-version.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set Python version
      id: python-version
      run: echo "version=3.11" >> $GITHUB_OUTPUT
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

  # ==================== STAGE 2: INSTALL DEPENDENCIES ====================
  install-dependencies:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ needs.setup.outputs.python_version }}
    
    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Verify installations
      run: |
        pip list | grep -E "flask|pytest|flake8" || echo "Packages installed"

  # ==================== STAGE 3: CODE QUALITY ====================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [setup, install-dependencies]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ needs.setup.outputs.python_version }}
    
    - name: Install flake8
      run: pip install flake8
    
    - name: Run flake8 linting
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ==================== STAGE 4: PREPARE TEST DATA ====================
  prepare-test-data:
    name: Prepare Test Data
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Download test data from S3
      run: |
        mkdir -p data/test
        echo "Downloading test data from S3..."
        aws s3 cp s3://engine-health-models-20260304-112538-28227/models/scenario_windows.pkl data/test/ || echo "Warning: Test data not found"
        echo "Test data directory:"
        ls -la data/test/ || echo "Empty directory"
    
    - name: Upload test data as artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-data
        path: data/test/
        retention-days: 1

  # ==================== STAGE 5: UNIT TESTS ====================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: [setup, install-dependencies, prepare-test-data]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ needs.setup.outputs.python_version }}
    
    - name: Download test data
      uses: actions/download-artifact@v4
      with:
        name: test-data
        path: data/test/
    
    - name: Restore pip cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
    
    - name: Install pytest
      run: pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        PYTHONPATH=$PYTHONPATH:$(pwd) pytest tests/ -v --cov=app --cov-report=xml -k "not test_endpoint and not test_model"
      continue-on-error: false
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 7

  # ==================== STAGE 6: ENDPOINT TESTS ====================
  endpoint-tests:
    name: Run Endpoint Tests
    runs-on: ubuntu-latest
    needs: [setup, install-dependencies, prepare-test-data]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ needs.setup.outputs.python_version }}
    
    - name: Download test data
      uses: actions/download-artifact@v4
      with:
        name: test-data
        path: data/test/
    
    - name: Install Flask test dependencies
      run: |
        pip install flask pytest
        pip install -r app/requirements.txt
    
    - name: Start Flask app in background
      run: |
        python app/app.py &
        sleep 10
        echo "Flask app started"
    
    - name: Test /health endpoint
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
        if [ "$response" = "200" ]; then
          echo "✅ /health endpoint OK"
        else
          echo "❌ /health endpoint returned $response"
          exit 1
        fi
    
    - name: Test / endpoint
      run: |
        curl -f http://localhost:5000/ | grep -q "Engine Health" || exit 1
        echo "✅ UI endpoint OK"

  # ==================== STAGE 7: MODEL TESTS ====================
  model-tests:
    name: Run Model Tests
    runs-on: ubuntu-latest
    needs: [setup, install-dependencies, prepare-test-data]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ needs.setup.outputs.python_version }}
    
    - name: Download test data
      uses: actions/download-artifact@v4
      with:
        name: test-data
        path: data/test/
    
    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt
        pip install pytest
    
    - name: Test model loading
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from services.model_loader import ModelLoader
        loader = ModelLoader()
        print('✅ Models loaded successfully')
        "
    
    - name: Test inference
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from services.inference_service import InferenceService
        service = InferenceService()
        result = service.predict([1.0, 2.0, 3.0])
        assert result is not None
        print('✅ Inference test passed')
        "

  # ==================== STAGE 8: BUILD DOCKER IMAGE ====================
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, endpoint-tests, model-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set image tag
      id: set_tag
      run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Build Docker image
      run: |
        docker build -t ${{ env.ECR_REPOSITORY }}:${{ steps.set_tag.outputs.tag }} .
        docker tag ${{ env.ECR_REPOSITORY }}:${{ steps.set_tag.outputs.tag }} ${{ env.ECR_REPOSITORY }}:latest
        echo "✅ Image built with tag: ${{ steps.set_tag.outputs.tag }}"
    
    - name: Save Docker image
      run: docker save ${{ env.ECR_REPOSITORY }}:${{ steps.set_tag.outputs.tag }} -o /tmp/docker-image.tar
    
    - name: Upload Docker image
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: /tmp/docker-image.tar
        retention-days: 1

  # ==================== STAGE 9: PUSH TO ECR ====================
  push-to-ecr:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Download Docker image
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp
    
    - name: Load and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ needs.build-image.outputs.image_tag }}
      run: |
        docker load < /tmp/docker-image.tar
        docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        docker tag ${{ env.ECR_REPOSITORY }}:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
        docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
        echo "✅ Image pushed to ECR: $IMAGE_TAG"

  # ==================== STAGE 10: TRIGGER INFRASTRUCTURE ====================
  trigger-infra:
    name: Trigger Infrastructure Deployment
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    
    steps:
    - name: Wait for ECR to be ready
      run: sleep 30
    
    - name: Determine target repository
      id: target
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "repo=Souhail12-deep/engine-health-infra" >> $GITHUB_OUTPUT
          echo "env=PROD" >> $GITHUB_OUTPUT
        else
          echo "repo=Souhail12-deep/engine-health-infra-dev" >> $GITHUB_OUTPUT
          echo "env=DEV" >> $GITHUB_OUTPUT
        fi
    
    - name: Repository Dispatch
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.GH_PAT }}
        repository: ${{ steps.target.outputs.repo }}
        event-type: new-app-version
        client-payload: '{"image_tag": "${{ needs.build-image.outputs.image_tag }}"}'
    
    - name: Dispatch Info
      run: |
        echo "========================================="
        echo "✅ Infrastructure pipeline triggered"
        echo "   Environment: ${{ steps.target.outputs.env }}"
        echo "   Image tag: ${{ needs.build-image.outputs.image_tag }}"
        echo "   Repository: ${{ steps.target.outputs.repo }}"
        echo "========================================="

  # ==================== STAGE 11: UPLOAD COVERAGE ====================
  upload-coverage:
    name: Upload Coverage Reports
    runs-on: ubuntu-latest
    needs: unit-tests
    if: always()
    
    steps:
    - name: Download coverage report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
    
    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false