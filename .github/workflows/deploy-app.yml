name: Deploy Application

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: engine-health-app

jobs:

# ==================== STAGE 1: SETUP ====================
  setup:
    runs-on: ubuntu-latest
    outputs:
      python_version: ${{ steps.python-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - id: python-version
        run: echo "version=3.11" >> $GITHUB_OUTPUT


# ==================== STAGE 2: INSTALL ====================
  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.setup.outputs.python_version }}
          cache: 'pip'   # ✅ caching added

      - run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov flake8


# ==================== STAGE 3: LINT ====================
  lint:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.setup.outputs.python_version }}
          cache: 'pip'

      - run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics


# ==================== STAGE 4: UNIT TESTS ====================
  unit-tests:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.setup.outputs.python_version }}
          cache: 'pip'

      - run: |
          mkdir -p models/anodet_models models/rul_models
          touch models/anodet_models/isolation_forest_latest.pkl
          touch models/anodet_models/scaler_latest.pkl
          touch models/rul_models/lstm_rul_latest.keras
          touch models/rul_models/minmax_scaler_latest.pkl

      - run: |
          PYTHONPATH=$PYTHONPATH:$(pwd) pytest tests/ -v --cov=app --cov-report=xml

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# ==================== STAGE 5: ENDPOINT TESTS ====================
  endpoint-tests:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ needs.setup.outputs.python_version }}

      - run: |
          mkdir -p models/anodet_models models/rul_models
          touch models/anodet_models/isolation_forest_latest.pkl
          touch models/anodet_models/scaler_latest.pkl
          touch models/rul_models/lstm_rul_latest.keras
          touch models/rul_models/minmax_scaler_latest.pkl

      - run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python app/app.py &
          sleep 10

      # ✅ Stronger API test
      - run: |
          curl -f http://localhost:5000/health
          echo "Health endpoint OK"

      # Optional: test JSON endpoint
      - run: |
          curl -X POST http://localhost:5000/get_scenario_sensors \
          -H "Content-Type: application/json" \
          -d '{}' || exit 1


# ==================== STAGE 6: BUILD ====================
  build-image:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, endpoint-tests]   # ✅ fixed dependencies

    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - run: |
          docker build -t $ECR_REPOSITORY:${{ steps.tag.outputs.tag }} .
          docker tag $ECR_REPOSITORY:${{ steps.tag.outputs.tag }} $ECR_REPOSITORY:latest

      - run: docker save $ECR_REPOSITORY:${{ steps.tag.outputs.tag }} -o image.tar

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar


# ==================== STAGE 7: PUSH ====================
  push-to-ecr:
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image

      - run: docker load < image.tar

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login
        uses: aws-actions/amazon-ecr-login@v2

      - run: |
          REGISTRY=${{ steps.login.outputs.registry }}
          TAG=${{ needs.build-image.outputs.image_tag }}

          docker tag $ECR_REPOSITORY:$TAG $REGISTRY/$ECR_REPOSITORY:$TAG
          docker tag $ECR_REPOSITORY:$TAG $REGISTRY/$ECR_REPOSITORY:latest

          docker push $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest


# ==================== STAGE 8: TRIGGER INFRA ====================
  trigger-infra:
    runs-on: ubuntu-latest
    needs: push-to-ecr

    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT }}
          repository: Souhail12-deep/engine-health-infra
          event-type: new-app-version
          client-payload: |
            {
              "image_tag": "${{ needs.build-image.outputs.image_tag }}",
              "environment": "${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}"
            }